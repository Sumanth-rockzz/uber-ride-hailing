version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: uber
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"